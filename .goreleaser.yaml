version: 2

builds:
  - main: ./cmd/ccrec
    binary: ccrec
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: capybara-translation
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/capybara-translation/ccrec"
    description: "Convert Claude Code conversation transcripts to Markdown"
    license: "MIT"
    install: |
      bin.install "ccrec"
    test: |
      system "#{bin}/ccrec", "--version"

changelog:
  sort: asc
